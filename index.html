<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HG Investing Pro</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#f0f3f7;
    font-family:-apple-system,sans-serif;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.control-panel{
    background:#fff;
    padding:10px;
    border-bottom:1px solid #eee;
}

.chart-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    margin-bottom:10px;
}

.quote-tile{
    position:relative;
    background:#f1f3f6;
    border-radius:8px;
    overflow:hidden;
    height:54px;
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 8px;
}

.quote-label{
    font-size:10px;
    color:#555;
    pointer-events:none;
    white-space:nowrap;
}

.quote-click{
    position:absolute;
    inset:0;
    cursor:pointer;
    z-index:3;
}

input{
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

#stock-chart-container{
    flex:1;
    width:100%;
}

@media (max-width: 768px){
    body{
        overflow:auto;
    }
    .main{
        flex:initial;
        min-height:100dvh;
    }
    .chart-grid{
        grid-template-columns:repeat(2,1fr);
    }
    .quote-tile{
        height:56px;
        padding:6px;
    }
    .quote-label{
        font-size:10px;
    }
    .quote-tile .tradingview-widget-container{
        transform:scale(0.7);
        transform-origin:left center;
    }
    #stock-chart-container{
        min-height:100dvh;
    }
    #translate-panel,
    #news-panel{
        min-height:100dvh;
    }
}
</style>
</head>

<body>

<div class="main">

    <div class="control-panel">

        <div class="chart-grid" id="quote-grid"></div>

        <div style="display:flex;gap:5px;">
            <input type="text" id="stock-search" placeholder="自定义代码 如 BTCUSDT" style="flex:1;">
            <button onclick="updateStockChart()"
            style="background:#4a90e2;color:#fff;border:none;padding:0 15px;border-radius:8px;">
            check
            </button>
            <button onclick="toggleTranslate()"
            style="background:#6a5acd;color:#fff;border:none;padding:0 12px;border-radius:8px;">
            war
            </button>
            <button onclick="toggleNews()"
            style="background:#ff6a00;color:#fff;border:none;padding:0 12px;border-radius:8px;">
            news
            </button>
        </div>

    </div>

    <div id="stock-chart-container"></div>
    <div id="translate-panel" style="display:none;flex:1;border-top:1px solid #eee;">
        <iframe id="translate-frame" src="https://iran.immersivetranslate.com/zh-CN/" style="width:100%;height:100%;border:0;"></iframe>
    </div>
    <div id="news-panel" style="display:none;flex:1;border-top:1px solid #eee;">
        <iframe id="news-frame" src="https://www.jin10.com/" style="width:100%;height:100%;border:0;"></iframe>
    </div>

</div>

<script>
const quickSymbols = [
    { label: "DXY", symbol: "DXY" },
    { label: "XAUUSD", symbol: "XAUUSD" },
    { label: "XAGUSD", symbol: "XAGUSD" },
    { label: "COPPER", symbol: "COPPER" },
    { label: "UKOIL", symbol: "UKOIL" },
    { label: "BTCUSD", symbol: "BTCUSD" },
    { label: "金银比", symbol: "XAUUSD/XAGUSD" },
    { label: "金油比", symbol: "XAUUSD/UKOIL" },
    { label: "铜油比", symbol: "COPPER/UKOIL" },
    { label: "金币比", symbol: "XAUUSD/BTCUSD" },
    { label: "USDCNY", symbol: "USDCNY" },
    { label: "JPYCNY", symbol: "JPYCNY" }
];

const tvSymbolMap = {
    "DXY": "DXY",
    "XAUUSD": "XAUUSD",
    "XAGUSD": "XAGUSD",
    "COPPER": "COPPER",
    "UKOIL": "UKOIL",
    "BTCUSD": "BTCUSD",
    "XAUUSD/XAGUSD": "XAUUSD/XAGUSD",
    "XAUUSD/UKOIL": "XAUUSD/UKOIL",
    "COPPER/UKOIL": "COPPER/UKOIL",
    "XAUUSD/BTCUSD": "XAUUSD/BTCUSD",
    "USDCNY": "USDCNY",
    "JPYCNY": "JPYCNY"
};

function appendSingleQuoteWidget(container, symbol){
    const script = document.createElement("script");
    script.type = "text/javascript";
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
        symbol: tvSymbolMap[symbol] || symbol,
        width: "100%",
        colorTheme: "light",
        isTransparent: true,
        locale: "zh_CN",
        showSymbolLogo: false,
        fontSize: "6"
    });
    container.appendChild(script);
}

function renderQuoteGrid(){
    const grid = document.getElementById("quote-grid");
    grid.innerHTML = "";

    quickSymbols.forEach(item => {
        const tile = document.createElement("div");
        tile.className = "quote-tile";

        const label = document.createElement("div");
        label.className = "quote-label";
        label.textContent = item.label;

        const widgetWrap = document.createElement("div");
        widgetWrap.className = "tradingview-widget-container";
        widgetWrap.style.height = "100%";
        widgetWrap.style.flex = "1";

        const widgetTarget = document.createElement("div");
        widgetTarget.className = "tradingview-widget-container__widget";
        widgetTarget.style.height = "100%";

        widgetWrap.appendChild(widgetTarget);
        appendSingleQuoteWidget(widgetWrap, item.symbol);

        const click = document.createElement("div");
        click.className = "quote-click";
        click.onclick = () => loadChart(item.symbol);

        tile.appendChild(label);
        tile.appendChild(widgetWrap);
        tile.appendChild(click);
        grid.appendChild(tile);
    });
}

function loadChart(symbol){
    document.getElementById('stock-search').value = symbol;
    updateStockChart(symbol);
}

function updateStockChart(symbolInput){

    const symbol = symbolInput ||
                   document.getElementById('stock-search').value ||
                   "XAUUSD/UKOIL";

    document.getElementById('stock-chart-container').innerHTML = '';

    new TradingView.widget({
        autosize:true,
        symbol: tvSymbolMap[symbol] || symbol,
        interval:"D",
        timezone:"Etc/UTC",
        theme:"light",
        style:"1",
        locale:"zh_CN",

        toolbar_bg:"#f1f3f6",
        enable_publishing:false,

        hide_top_toolbar:false,
        hide_side_toolbar:false,
        hide_legend:false,

        save_image:true,

        container_id:"stock-chart-container",
        studies:["RSI@tv-basicstudies"]
    });
}

function showChart(){
    const chart = document.getElementById("stock-chart-container");
    const translate = document.getElementById("translate-panel");
    const news = document.getElementById("news-panel");
    chart.style.display = "block";
    translate.style.display = "none";
    news.style.display = "none";
    updateStockChart();
}

function toggleTranslate(){
    const panel = document.getElementById("translate-panel");
    const showing = panel.style.display !== "none";
    if (showing) {
        showChart();
        return;
    }
    panel.style.display = "flex";
    document.getElementById("news-panel").style.display = "none";
    document.getElementById("stock-chart-container").style.display = "none";
}

function toggleNews(){
    const panel = document.getElementById("news-panel");
    const showing = panel.style.display !== "none";
    if (showing) {
        showChart();
        return;
    }
    panel.style.display = "flex";
    document.getElementById("translate-panel").style.display = "none";
    document.getElementById("stock-chart-container").style.display = "none";
}

window.onload = function(){
    renderQuoteGrid();
    loadChart("UKOIL");
};
</script>

</body>
</html>
