<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HG Investing Pro</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#f0f3f7;
    font-family:-apple-system,sans-serif;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.control-panel{
    background:#fff;
    padding:10px;
    border-bottom:1px solid #eee;
    overflow:visible;
}

.chart-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    margin-bottom:10px;
}

.quote-tile{
    position:relative;
    background:#f1f3f6;
    border-radius:8px;
    overflow:hidden;
    height:54px;
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 8px;
}

.quote-label{
    font-size:9px;
    color:#555;
    pointer-events:none;
    white-space:nowrap;
}

.quote-click{
    position:absolute;
    inset:0;
    cursor:pointer;
    z-index:3;
}

input{
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

#chart-wrap{
    flex:1;
    width:100%;
    position:relative;
}
#stock-chart-container{
    width:100%;
    height:100%;
    position:relative;
    z-index:1;
}
#stock-chart-container iframe{
    position:relative;
    z-index:1;
}

#cycle-bar{
    position:absolute;
    left:10px;
    bottom:36px;
    display:flex;
    gap:6px;
    padding:4px 6px;
    background:rgba(255,255,255,0.9);
    border:1px solid #eee;
    border-radius:8px;
    z-index:10;
    pointer-events:auto;
}
.cycle-btn{
    padding:4px 8px;
    font-size:12px;
    background:#f3f4f6;
    border-radius:6px;
    cursor:pointer;
    user-select:none;
}
.cycle-btn:hover{background:#dbeafe;}
.cycle-btn.active{background:#dbeafe;color:#1e40af;font-weight:bold;}

#macroLight{
    margin:6px 0;
    padding:6px;
    border-radius:6px;
    font-size:12px;
    background:#3b82f6;
    color:#fff;
}

#macroAdvice{
    margin:6px 0;
    padding:6px;
    border-radius:6px;
    font-size:12px;
    background:#e0f2fe;
    color:#000;
}

.signal{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:6px;
}
.green{background:#00ff90;}
.yellow{background:#ffd000;}
.red{background:#ff4040;}

#translate-panel,
#news-panel{
    display:none;
    border-top:1px solid #eee;
    flex:1;
    min-height:70dvh;
}
#translate-panel iframe,
#news-panel iframe{
    width:100%;
    height:100dvh;
    border:0;
}

#back-to-quotes{
    position:fixed;
    right:12px;
    bottom:12px;
    z-index:20;
    background:#111827;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    font-size:12px;
    display:none;
}


@media (max-width: 1024px){
    body{
        overflow:auto;
    }
    .main{
        flex:initial;
        min-height:100dvh;
    }
    .control-panel{
        max-height:none;
        overflow:visible;
    }
    .chart-grid{
        grid-template-columns:repeat(2,1fr);
    }
    .quote-tile{
        height:60px;
        padding:6px;
    }
    .quote-label{
        font-size:11px;
    }
    .quote-tile .tradingview-widget-container{
        transform:scale(0.8);
        transform-origin:left center;
    }
    #chart-wrap{
        min-height:70dvh;
    }
    #translate-panel,
    #news-panel{
        min-height:70dvh;
    }
}

@media (max-width: 600px){
    .control-panel{
        max-height:none;
        overflow:visible;
    }
    .quote-tile{
        height:56px;
    }
    .quote-label{
        font-size:10px;
    }
    .quote-tile .tradingview-widget-container{
        transform:scale(0.7);
        transform-origin:left center;
    }
    #chart-wrap{
        min-height:100dvh;
        height:100dvh;
    }
    #translate-panel,
    #news-panel{
        min-height:100dvh;
        height:100dvh;
    }
}
</style>
</head>

<body>

<div class="main">

    <div class="control-panel">

        <div class="chart-grid" id="quote-grid"></div>

        <div style="display:flex;gap:5px;">
            <input type="text" id="stock-search" placeholder="自定义代码 如 BTCUSDT" style="flex:1;">
            <button onclick="updateStockChart()"
            style="background:#4a90e2;color:#fff;border:none;padding:0 15px;border-radius:8px;">
            check
            </button>
            <button onclick="toggleTranslate()"
            style="background:#6a5acd;color:#fff;border:none;padding:0 12px;border-radius:8px;">
            war
            </button>
            <button onclick="toggleNews()"
            style="background:#ff6a00;color:#fff;border:none;padding:0 12px;border-radius:8px;">
            news
            </button>
            <button onclick="macroCheck()"
            style="background:#f59e0b;color:#fff;border:none;padding:0 12px;border-radius:8px;">
            Mac
            </button>
        </div>

        <div id="macroLight">刷新宏观信号</div>
        <div id="macroAdvice"></div>

    </div>

    <div id="chart-wrap">
        <div id="stock-chart-container"></div>
        <div id="cycle-bar">
            <div class="cycle-btn" onclick="setCycle('D', this)">日</div>
            <div class="cycle-btn" onclick="setCycle('W', this)">周</div>
            <div class="cycle-btn" onclick="setCycle('M', this)">月</div>
            <div class="cycle-btn" onclick="setRange('ytd', this)">YTD</div>
            <div class="cycle-btn" onclick="setRange('12m', this)">年</div>
            <div class="cycle-btn" onclick="setRange('60m', this)">5年</div>
            <div class="cycle-btn" onclick="setRange('all', this)">全部</div>
        </div>
    </div>
    <div id="translate-panel">
        <iframe id="translate-frame" src="https://iran.immersivetranslate.com/zh-CN/"></iframe>
    </div>
    <div id="news-panel">
        <iframe id="news-frame" src="https://www.jin10.com/"></iframe>
    </div>
</div>

<button id="back-to-quotes" onclick="backToQuotes()">回到报价</button>

<script>
let widget;
let currentSymbol = "UKOIL";
let currentInterval = "D";
let currentRange = null;

const quickSymbols = [
    { label: "USDCNY", symbol: "USDCNY" },
    { label: "JPYCNY", symbol: "JPYCNY" },
    { label: "XAUUSD", symbol: "XAUUSD" },
    { label: "COPPER", symbol: "COPPER" },
    { label: "UKOIL", symbol: "UKOIL" },
    { label: "股油比", symbol: "SP500/WTI" },
    { label: "铜油比", symbol: "COPPER/WTI" },
    { label: "金油比", symbol: "XAUUSD/WTI" },
    { label: "US10Y", symbol: "US10Y" },
    { label: "DXY", symbol: "DXY" },
    { label: "BTCUSD", symbol: "BTCUSD" },
    { label: "金币比", symbol: "XAUUSD/BTCUSD" }
];

const tvSymbolMap = {
    "XAUUSD": "XAUUSD",
    "COPPER": "COPPER",
    "UKOIL": "UKOIL",
    "SP500/WTI": "SP500/WTI",
    "COPPER/WTI": "COPPER/WTI",
    "XAUUSD/WTI": "XAUUSD/WTI",
    "US10Y": "US10Y",
    "DXY": "DXY",
    "BTCUSD": "BTCUSD",
    "XAUUSD/BTCUSD": "XAUUSD/BTCUSD",
    "USDCNY": "USDCNY",
    "JPYCNY": "JPYCNY"
};

function appendSingleQuoteWidget(container, symbol){
    const script = document.createElement("script");
    script.type = "text/javascript";
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
        symbol: tvSymbolMap[symbol] || symbol,
        width: "100%",
        colorTheme: "light",
        isTransparent: true,
        locale: "zh_CN",
        showSymbolLogo: false,
        fontSize: "1"
    });
    container.appendChild(script);
}

function renderQuoteGrid(){
    const grid = document.getElementById("quote-grid");
    grid.innerHTML = "";

    quickSymbols.forEach(item => {
        const tile = document.createElement("div");
        tile.className = "quote-tile";
        const label = document.createElement("div");
        label.className = "quote-label";
        label.textContent = item.label;

        const widgetWrap = document.createElement("div");
        widgetWrap.className = "tradingview-widget-container";
        widgetWrap.style.height = "100%";
        widgetWrap.style.flex = "1";

        const widgetTarget = document.createElement("div");
        widgetTarget.className = "tradingview-widget-container__widget";
        widgetTarget.style.height = "100%";

        widgetWrap.appendChild(widgetTarget);
        appendSingleQuoteWidget(widgetWrap, item.symbol);

        const click = document.createElement("div");
        click.className = "quote-click";
        click.onclick = () => loadChart(item.symbol);

        tile.appendChild(label);
        tile.appendChild(widgetWrap);
        tile.appendChild(click);
        grid.appendChild(tile);
    });
}

function loadChart(symbol){
    document.getElementById('stock-search').value = symbol;
    updateStockChart(symbol);
}

function updateStockChart(symbolInput){

    const symbol = symbolInput ||
                   document.getElementById('stock-search').value ||
                   "XAUUSD/UKOIL";
    currentSymbol = symbol;

    document.getElementById('stock-chart-container').innerHTML = '';

    widget = new TradingView.widget({
        autosize:true,
        symbol: tvSymbolMap[symbol] || symbol,
        interval: currentInterval,
        range: currentRange || undefined,
        timezone:"Etc/UTC",
        theme:"light",
        style:"1",
        locale:"zh_CN",

        toolbar_bg:"#f1f3f6",
        enable_publishing:false,

        hide_top_toolbar:false,
        hide_side_toolbar:false,
        hide_legend:false,

        save_image:true,

        container_id:"stock-chart-container",
        studies:["RSI@tv-basicstudies"]
    });
}

function highlightButton(btn){
    document.querySelectorAll('.cycle-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

function setCycle(cycle, btn){
    currentInterval = cycle;
    currentRange = null;
    updateStockChart(currentSymbol);
    highlightButton(btn);
}

function setRange(type, btn){
    if (type === "ytd") currentRange = "YTD";
    if (type === "12m") currentRange = "12M";
    if (type === "60m") currentRange = "60M";
    if (type === "all") currentRange = "ALL";
    updateStockChart(currentSymbol);
    highlightButton(btn);
}

function macroCheck(){
    const goldOil = 18, copperOil = 3.2, dxy = 105, us10y = 3.8;
    let text = "", strategy = "";

    if (us10y > 4.8){
        text = `<span class="signal red"></span>过热风险`;
        strategy = `<ul>
            <li>短期美债(T-bills) 50%</li>
            <li>现金/货币基金 30%</li>
            <li>避险黄金ETF 20%</li>
        </ul>`;
    } else if (goldOil > 18 && copperOil > 3){
        text = `<span class="signal green"></span>经济复苏`;
        strategy = `<ul>
            <li>标普500指数ETF 40%</li>
            <li>原油ETF/WTI 20%</li>
            <li>工业金属ETF/铜 20%</li>
            <li>成长型科技股 20%</li>
        </ul>`;
    } else if (goldOil > 20 && copperOil < 2){
        text = `<span class="signal yellow"></span>滞涨风险`;
        strategy = `<ul>
            <li>黄金ETF 40%</li>
            <li>消费必需品ETF 30%</li>
            <li>优质企业债券 30%</li>
        </ul>`;
    } else {
        text = `<span class="signal red"></span>衰退风险`;
        strategy = `<ul>
            <li>国债/高等级企业债券 50%</li>
            <li>现金/货币基金 30%</li>
            <li>防御性蓝筹股 20%</li>
        </ul>`;
    }

    document.getElementById("macroLight").innerHTML = text;
    document.getElementById("macroAdvice").innerHTML = strategy;
}

function backToQuotes(){
    document.getElementById("translate-panel").style.display = "none";
    document.getElementById("news-panel").style.display = "none";
    document.getElementById("chart-wrap").style.display = "block";
    document.getElementById("cycle-bar").style.display = "flex";
    document.getElementById("back-to-quotes").style.display = "none";
    updateStockChart();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function toggleTranslate(){
    const panel = document.getElementById("translate-panel");
    const showing = panel.style.display !== "none";
    if (showing) {
        backToQuotes();
        return;
    }
    panel.style.display = "block";
    document.getElementById("news-panel").style.display = "none";
    document.getElementById("chart-wrap").style.display = "none";
    document.getElementById("cycle-bar").style.display = "none";
    document.getElementById("back-to-quotes").style.display = "block";
    panel.scrollIntoView({ behavior: "smooth", block: "start" });
}

function toggleNews(){
    const panel = document.getElementById("news-panel");
    const showing = panel.style.display !== "none";
    if (showing) {
        backToQuotes();
        return;
    }
    panel.style.display = "block";
    document.getElementById("translate-panel").style.display = "none";
    document.getElementById("chart-wrap").style.display = "none";
    document.getElementById("cycle-bar").style.display = "none";
    document.getElementById("back-to-quotes").style.display = "block";
    panel.scrollIntoView({ behavior: "smooth", block: "start" });
}

window.onload = function(){
    renderQuoteGrid();
    loadChart("UKOIL");
};
</script>

</body>
</html>
