<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HG Investing Pro</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f0f3f7;
font-family:-apple-system,sans-serif;
height:100vh;
height:100dvh;
display:flex;
flex-direction:column;
overflow:hidden;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.control-panel{
background:#fff;
padding:10px;
border-bottom:1px solid #eee;
}

.chart-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-bottom:10px;
}

.quote-tile{
position:relative;
background:#f1f3f6;
border-radius:8px;
overflow:hidden;
height:54px;
display:flex;
align-items:center;
gap:6px;
padding:6px 8px;
}

.quote-label{
font-size:10px;
color:#555;
pointer-events:none;
white-space:nowrap;
}

.quote-click{
position:absolute;
inset:0;
cursor:pointer;
z-index:3;
}

input{
padding:8px;
border-radius:6px;
border:1px solid #ddd;
}

#stock-chart-container{
flex:1;
width:100%;
position:relative;
}

#cycle-bar{
display:flex;
gap:6px;
padding:6px;
background:#fff;
border-top:1px solid #eee;
}

.cycle-btn{
padding:4px 10px;
font-size:12px;
background:#f3f4f6;
border-radius:6px;
cursor:pointer;
}

.cycle-btn:hover{
background:#dbeafe;
}

@media (max-width:768px){

body{
overflow:auto;
}

.main{
flex:initial;
min-height:100dvh;
}

.chart-grid{
grid-template-columns:repeat(2,1fr);
}

#stock-chart-container{
min-height:100dvh;
}

#translate-panel,
#news-panel{
min-height:100dvh;
}

}

</style>
</head>

<body>

<div class="main">

<div class="control-panel">

<div class="chart-grid" id="quote-grid"></div>

<div style="display:flex;gap:5px;">
<input type="text" id="stock-search" placeholder="如 BTCUSD" style="flex:1;">
<button onclick="updateStockChart()"
style="background:#4a90e2;color:#fff;border:none;padding:0 15px;border-radius:8px;">
check
</button>

<button onclick="toggleTranslate()"
style="background:#6a5acd;color:#fff;border:none;padding:0 12px;border-radius:8px;">
war
</button>

<button onclick="toggleNews()"
style="background:#ff6a00;color:#fff;border:none;padding:0 12px;border-radius:8px;">
news
</button>
</div>

</div>

<div id="stock-chart-container"></div>

<div id="cycle-bar">

<div class="cycle-btn" onclick="setCycle('D')">日</div>
<div class="cycle-btn" onclick="setCycle('W')">周</div>
<div class="cycle-btn" onclick="setCycle('M')">月</div>

<div class="cycle-btn" onclick="setRange('ytd')">YTD</div>
<div class="cycle-btn" onclick="setRange('12m')">1Y</div>
<div class="cycle-btn" onclick="setRange('60m')">5Y</div>
<div class="cycle-btn" onclick="setRange('all')">ALL</div>

</div>

<div id="translate-panel" style="display:none;flex:1;">
<iframe src="https://iran.immersivetranslate.com/zh-CN/" style="width:100%;height:100%;border:0;"></iframe>
</div>

<div id="news-panel" style="display:none;flex:1;">
<iframe src="https://www.jin10.com/" style="width:100%;height:100%;border:0;"></iframe>
</div>

</div>

<script>

let widget
let tvChart

const quickSymbols = [
{ label:"USDCNY",symbol:"FX_IDC:USDCNY"},
{ label:"JPYCNY",symbol:"FX_IDC:JPYCNY"},
{ label:"XAUUSD",symbol:"OANDA:XAUUSD"},
{ label:"COPPER",symbol:"COMEX:HG1!"},
{ label:"UKOIL",symbol:"TVC:UKOIL"},
{ label:"股油比",symbol:"SP:SPX/TVC:USOIL"},
{ label:"铜油比",symbol:"COMEX:HG1!/TVC:USOIL"},
{ label:"金油比",symbol:"OANDA:XAUUSD/TVC:USOIL"},
{ label:"US10Y",symbol:"TVC:US10Y"},
{ label:"DXY",symbol:"TVC:DXY"},
{ label:"BTCUSD",symbol:"BINANCE:BTCUSDT"},
{ label:"金币比",symbol:"OANDA:XAUUSD/BINANCE:BTCUSDT"}
]

function renderQuoteGrid(){

const grid=document.getElementById("quote-grid")
grid.innerHTML=""

quickSymbols.forEach(item=>{

const tile=document.createElement("div")
tile.className="quote-tile"

tile.innerHTML=`<div class="quote-label">${item.label}</div>`

tile.onclick=()=>loadChart(item.symbol)

grid.appendChild(tile)

})

}

function loadChart(symbol){

document.getElementById('stock-search').value=symbol
updateStockChart(symbol)

}

function updateStockChart(symbolInput){

const symbol=symbolInput||
document.getElementById('stock-search').value||
"TVC:UKOIL"

document.getElementById("stock-chart-container").innerHTML=""

widget=new TradingView.widget({

autosize:true,
symbol:symbol,
interval:"D",
timezone:"Etc/UTC",
theme:"light",
style:"1",
locale:"zh_CN",

toolbar_bg:"#f1f3f6",

enable_publishing:false,

hide_top_toolbar:false,
hide_side_toolbar:false,
hide_legend:false,

save_image:true,

container_id:"stock-chart-container",

studies:["RSI@tv-basicstudies"]

})

widget.onChartReady(()=>{

tvChart=widget.chart()

})

}

function setCycle(cycle){

if(!tvChart)return
tvChart.setResolution(cycle)

}

function setRange(type){

if(!tvChart)return

const now=Math.floor(Date.now()/1000)

let from

if(type==="ytd"){

const year=new Date().getFullYear()
from=Math.floor(new Date(year,0,1)/1000)

}

if(type==="12m") from=now-31536000
if(type==="60m") from=now-31536000*5
if(type==="all") from=0

tvChart.setVisibleRange({

from:from,
to:now

})

}

function showChart(){

document.getElementById("stock-chart-container").style.display="block"
document.getElementById("cycle-bar").style.display="flex"

document.getElementById("translate-panel").style.display="none"
document.getElementById("news-panel").style.display="none"

}

function toggleTranslate(){

const panel=document.getElementById("translate-panel")
const showing=panel.style.display!=="none"

if(showing){

showChart()
return

}

panel.style.display="flex"
document.getElementById("news-panel").style.display="none"
document.getElementById("stock-chart-container").style.display="none"
document.getElementById("cycle-bar").style.display="none"

}

function toggleNews(){

const panel=document.getElementById("news-panel")
const showing=panel.style.display!=="none"

if(showing){

showChart()
return

}

panel.style.display="flex"
document.getElementById("translate-panel").style.display="none"
document.getElementById("stock-chart-container").style.display="none"
document.getElementById("cycle-bar").style.display="none"

}

window.onload=function(){

renderQuoteGrid()

loadChart("TVC:UKOIL")

}

</script>

</body>
</html>
